name: Build Terminalis

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: Terminalis-windows-amd64
          - os: macos-latest
            platform: darwin/universal
            artifact: Terminalis-macos-universal
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: Terminalis-linux-amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: wails build -platform ${{ matrix.platform }} -tags webkit2_41

      - name: Build (non-Linux)
        if: runner.os != 'Linux'
        run: wails build -platform ${{ matrix.platform }}

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/Terminalis.exe

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/Terminalis.app

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/Terminalis

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package artifacts
        run: |
          cd artifacts
          zip -r ../Terminalis-windows-amd64.zip Terminalis-windows-amd64/
          zip -r ../Terminalis-macos-universal.zip Terminalis-macos-universal/
          tar -czf ../Terminalis-linux-amd64.tar.gz Terminalis-linux-amd64/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Terminalis-windows-amd64.zip
            Terminalis-macos-universal.zip
            Terminalis-linux-amd64.tar.gz
          generate_release_notes: true
